<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜀庄菌汤火锅 - 扫码点餐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-icon {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }
        .info-text {
            flex: 1;
        }
        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .menu-section {
            padding: 20px;
            background: #f8f9fa;
        }
        .menu-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-name {
            font-size: 14px;
            color: #333;
        }
        .menu-price {
            font-size: 14px;
            color: #ee5a24;
            font-weight: 600;
        }
        .action-buttons {
            padding: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-meituan {
            background: #ff6b2c;
            color: white;
        }
        .btn-douyin {
            background: #1e1e1e;
            color: white;
        }
        .btn-order {
            background: #4ecdc4;
            color: white;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>正在识别您的账号...</p>
        </div>
    </div>

    <script>
        // 检测运行环境
        const userAgent = navigator.userAgent.toLowerCase();
        const isWeixin = userAgent.indexOf('micromessenger') > -1;
        const isDouyin = userAgent.indexOf('douyin') > -1 || userAgent.indexOf('bytedance') > -1;
        const isAlipay = userAgent.indexOf('alipay') > -1;

        // 商家配置信息
        const shopConfig = {
            name: '蜀庄菌汤火锅',
            address: '河北省邢台市内丘县',
            phone: '138****8888',
            description: '正宗菌汤火锅，养生又美味',
            menu: [
                { name: '招牌菌汤锅底', price: '48元' },
                { name: '新鲜肥牛', price: '38元' },
                { name: '手打牛肉丸', price: '28元' },
                { name: '鲜菌拼盘', price: '32元' },
                { name: '特色小料', price: '6元/位' }
            ],
            // 商家跳转链接配置
            caoliaoUrl: 'https://qr61.cn/oFWnKe/qLJrevn', // 草料模板页（微信）
            meituanUrl: 'http://dpurl.cn/5JRuksxz', // 美团店铺
            douyinUrl: 'https://v.douyin.com/ZhrpJBZ5Tv8/', // 抖音主页
            douyinShopUrl: 'https://v.douyin.com/ZhrpJBZ5Tv8/' // 抖音团购
        };

        // 根据环境自动跳转 - 无痕中间页
        function autoRedirect() {
            // 抖音内置浏览器 - 跳转抖音团购
            if (isDouyin) {
                window.location.replace(shopConfig.douyinShopUrl);
                return;
            }
            
            // 微信内置浏览器 - 跳转草料模板页
            if (isWeixin) {
                window.location.replace(shopConfig.caoliaoUrl);
                return;
            }
            
            // 其他浏览器 - 默认跳转到草料模板页
            window.location.replace(shopConfig.caoliaoUrl);
        }

        // 显示微信页面
        function showWeixinPage() {
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>${shopConfig.name}</h1>
                    <p>${shopConfig.description}</p>
                </div>
                <div class="content">
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-text">
                            <div class="info-label">地址</div>
                            <div class="info-value">${shopConfig.address}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📞</div>
                        <div class="info-text">
                            <div class="info-label">电话</div>
                            <div class="info-value">${shopConfig.phone}</div>
                        </div>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-title">📋 招牌菜品</div>
                    ${shopConfig.menu.map(item => `
                        <div class="menu-item">
                            <span class="menu-name">${item.name}</span>
                            <span class="menu-price">${item.price}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="action-buttons">
                    <a href="${shopConfig.meituanUrl}" class="btn btn-meituan">
                        🛒 抢购美团团购套餐
                    </a>
                    <a href="tel:${shopConfig.phone}" class="btn btn-order">
                        📞 拨打电话订餐
                    </a>
                </div>
                <div class="footer">
                    扫一扫，获取更多优惠信息
                </div>
            `;
        }

        // 显示抖音页面
        function showDouyinPage() {
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>${shopConfig.name}</h1>
                    <p>${shopConfig.description}</p>
                </div>
                <div class="content">
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-text">
                            <div class="info-label">地址</div>
                            <div class="info-value">${shopConfig.address}</div>
                        </div>
                    </div>
                </div>
                <div class="action-buttons">
                    <a href="${shopConfig.douyinShopUrl}" class="btn btn-douyin">
                        🎵 抢购抖音团购优惠
                    </a>
                    <a href="${shopConfig.douyinUrl}" class="btn btn-order">
                        👀 进入抖音主页
                    </a>
                </div>
                <div class="footer">
                    抖音扫码，专属优惠等你来
                </div>
            `;
        }

        // 显示默认页面
        function showDefaultPage() {
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>${shopConfig.name}</h1>
                    <p>${shopConfig.description}</p>
                </div>
                <div class="content">
                    <div class="info-item">
                        <div class="info-icon">📍</div>
                        <div class="info-text">
                            <div class="info-label">地址</div>
                            <div class="info-value">${shopConfig.address}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📞</div>
                        <div class="info-text">
                            <div class="info-label">电话</div>
                            <div class="info-value">${shopConfig.phone}</div>
                        </div>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-title">📋 招牌菜品</div>
                    ${shopConfig.menu.map(item => `
                        <div class="menu-item">
                            <span class="menu-name">${item.name}</span>
                            <span class="menu-price">${item.price}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="action-buttons">
                    <a href="${shopConfig.meituanUrl}" class="btn btn-meituan">
                        🛒 美团团购
                    </a>
                    <a href="${shopConfig.douyinUrl}" class="btn btn-douyin">
                        🎵 抖音主页
                    </a>
                    <a href="tel:${shopConfig.phone}" class="btn btn-order">
                        📞 电话订餐
                    </a>
                </div>
            `;
        }

        // 页面加载完成后自动执行
        window.onload = autoRedirect;
    </script>
</body>
</html>
